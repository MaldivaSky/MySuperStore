[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile.prod"

[deploy]
startCommand = "sh -c 'python manage.py migrate --noinput && python manage.py collectstatic --noinput --clear || true && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level info'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
