services:
  api:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - ./media:/app/media
      - ./db.sqlite3:/legacy_db.sqlite3:ro
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
      # postgres removido — usando Neon (DATABASE_URL no .env)

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - api

  celery:
    build: ./backend
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - api

  celery-beat:
    build: ./backend
    command: celery -A config beat -l info -s /tmp/celerybeat-schedule
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - api

  # postgres comentado — usando Neon via DATABASE_URL no .env
  # postgres:
  #   image: postgres:16-alpine
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   environment:
  #     POSTGRES_DB: ${POSTGRES_DB:-mysuperstore}
  #     POSTGRES_USER: ${POSTGRES_USER:-postgres}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  #   ports:
  #     - "5433:5432"  # 5433 externo para não conflitar com outras instâncias
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"  # 6380 externo para não conflitar com outras instâncias

  meilisearch:
    image: getmeili/meilisearch:latest
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-devmasterkey}
      MEILI_ENV: development

volumes:
  # postgres_data: # comentado — usando Neon
  meilisearch_data:
